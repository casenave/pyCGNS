name: Package

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-wheel:
    name: Build wheel (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Linux HDF5 dependency
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libhdf5-dev pkg-config

      - name: Install macOS HDF5 dependency
        if: runner.os == 'macOS'
        run: |
          brew untap aws/tap || true
          brew install hdf5 pkg-config

      - name: Install Windows HDF5 dependency
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          vcpkg install hdf5:x64-windows
          $vcpkgRoot = $env:VCPKG_INSTALLATION_ROOT
          if (-not $vcpkgRoot) {
            $vcpkgRoot = 'C:\vcpkg'
          }
          $hdf5Root = Join-Path $vcpkgRoot 'installed\x64-windows'
          if (-not (Test-Path (Join-Path $hdf5Root 'include\hdf5.h'))) {
            throw "Unable to find vcpkg HDF5 installation under $hdf5Root"
          }
          "HDF5_ROOT=$hdf5Root" | Out-File -FilePath $env:GITHUB_ENV -Append
          "CMAKE_PREFIX_PATH=$hdf5Root" | Out-File -FilePath $env:GITHUB_ENV -Append
          "PKG_CONFIG_PATH=$hdf5Root\lib\pkgconfig" | Out-File -FilePath $env:GITHUB_ENV -Append
          "$hdf5Root\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install build frontend
        run: python -m pip install --upgrade pip build

      - name: Build wheel
        if: runner.os != 'Windows'
        run: python -m build --wheel --outdir dist

      - name: Build wheel
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          for /f "usebackq tokens=*" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do set "VSINSTALLDIR=%%i"
          if not defined VSINSTALLDIR (
            echo Visual Studio with MSVC x64 tools was not found.
            exit /b 1
          )
          call "%VSINSTALLDIR%\Common7\Tools\VsDevCmd.bat" -arch=x64 -host_arch=x64
          if errorlevel 1 exit /b 1
          set CC=cl
          set CXX=cl
          python -m build --wheel --outdir dist --config-setting=setup-args="-Dhdf5-root=%HDF5_ROOT%"

      - name: Install built wheel
        shell: bash
        run: |
          python -m pip install "$(pwd)"/dist/*.whl

      - name: Import smoke test
        shell: bash
        run: |
          cd "${RUNNER_TEMP}"
          python -c "import CGNS; import CGNS.MAP; import CGNS.PAT; import CGNS.VAL; import CGNS.APP; print('pyCGNS import smoke test OK')"

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - name: Install Linux HDF5 dependency
        run: |
          sudo apt-get update
          sudo apt-get install -y libhdf5-dev pkg-config
      - name: Install build frontend
        run: python -m pip install --upgrade pip build
      - name: Build sdist
        run: python -m build --sdist --outdir dist