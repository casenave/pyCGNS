# This workflow will upload a Python Package using Twine when a release is created
# For more information see: https://help.github.com/en/actions/language-and-framework-guides/using-python-with-github-actions#publishing-to-package-registries

name: Upload Python Package

on:
#  workflow_dispatch:
#  push:
#    branches: 
#      - master
  release:
    types: [created]

env:
  HDF5_VERSION: 2.1.1

jobs:
  deploy:

    runs-on: ubuntu-latest
    container: quay.io/pypa/manylinux_2_28_x86_64
    steps:
    - uses: actions/checkout@v5
    - name: Install dev dependencies
      run: |
        yum -y install gcc
        curl -fsSLo hdf5-$HDF5_VERSION.tar.gz "https://github.com/HDFGroup/hdf5/releases/download/$HDF5_VERSION/hdf5-$HDF5_VERSION.tar.gz"
        gunzip < hdf5-$HDF5_VERSION.tar.gz | tar xf -
        /opt/python/cp310-cp310/bin/pip install build twine auditwheel 'cmake<4' ninja
        /opt/python/cp310-cp310/bin/python -m cmake -S "hdf5-$HDF5_VERSION" -B hdf5-build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=/usr/local \
          -DBUILD_SHARED_LIBS=OFF \
          -DBUILD_TESTING=OFF \
          -DHDF5_BUILD_TOOLS=OFF \
          -DHDF5_BUILD_EXAMPLES=OFF \
          -DHDF5_BUILD_HL_LIB=OFF \
          -DHDF5_BUILD_CPP_LIB=OFF \
          -DHDF5_BUILD_FORTRAN=OFF \
          -DHDF5_ENABLE_Z_LIB_SUPPORT=OFF \
          -DHDF5_ENABLE_SZIP_SUPPORT=OFF
        /opt/python/cp310-cp310/bin/python -m cmake --build hdf5-build --target install --config Release
    - name: Build and publish
      env:
        TWINE_USERNAME: ${{ secrets.PYPI_USERNAME }}
        TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
      run: |
        git config --global safe.directory "*"
        bash .github/workflows/build-wheels.sh
        /opt/python/cp310-cp310/bin/python -m build --wheel --outdir buildwheel/
        /opt/python/cp310-cp310/bin/python -m build --sdist --outdir wheelhouse/
        /opt/python/cp310-cp310/bin/python -m twine upload wheelhouse/*
