name: Package

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-wheel:
    name: Build wheel (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Enable Visual Studio shell
        if: runner.os == 'Windows'
        uses: egor-tensin/vs-shell@v2
        with:
          arch: x64

      - name: Install Linux HDF5 dependency
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libhdf5-dev pkg-config

      - name: Install macOS HDF5 dependency
        if: runner.os == 'macOS'
        run: |
          brew untap aws/tap || true
          brew install hdf5 pkg-config

      - name: Install Windows HDF5 dependency
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          vcpkg install hdf5:x64-windows
          $vcpkgRoot = $env:VCPKG_INSTALLATION_ROOT
          if (-not $vcpkgRoot) {
            $vcpkgRoot = 'C:\vcpkg'
          }
          $hdf5Root = Join-Path $vcpkgRoot 'installed\x64-windows'
          if (-not (Test-Path (Join-Path $hdf5Root 'include\hdf5.h'))) {
            throw "Unable to find vcpkg HDF5 installation under $hdf5Root"
          }
          "HDF5_ROOT=$hdf5Root" | Out-File -FilePath $env:GITHUB_ENV -Append
          "CMAKE_PREFIX_PATH=$hdf5Root" | Out-File -FilePath $env:GITHUB_ENV -Append
          "PKG_CONFIG_PATH=$hdf5Root\lib\pkgconfig" | Out-File -FilePath $env:GITHUB_ENV -Append
          "$hdf5Root\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install build frontend
        run: python -m pip install --upgrade pip build

      - name: Install Linux wheel repair tool
        if: runner.os == 'Linux'
        run: python -m pip install auditwheel

      - name: Install macOS wheel repair tool
        if: runner.os == 'macOS'
        run: python -m pip install delocate

      - name: Install Windows wheel repair tool
        if: runner.os == 'Windows'
        run: python -m pip install delvewheel

      - name: Build wheel
        if: runner.os != 'Windows'
        run: python -m build --wheel --outdir dist

      - name: Build wheel
        if: runner.os == 'Windows'
        shell: pwsh
        run: python -m build --wheel --outdir dist --config-setting=setup-args="-Dhdf5-root=$env:HDF5_ROOT"

      - name: Bundle Linux wheel dependencies
        if: runner.os == 'Linux'
        run: |
          mkdir -p wheelhouse
          for whl in dist/*.whl; do
            auditwheel repair "$whl" -w wheelhouse/
          done

      - name: Bundle macOS wheel dependencies
        if: runner.os == 'macOS'
        run: |
          mkdir -p wheelhouse
          for whl in dist/*.whl; do
            delocate-wheel -w wheelhouse "$whl"
          done

      - name: Bundle Windows wheel dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force wheelhouse | Out-Null
          Get-ChildItem dist\*.whl | ForEach-Object {
            python -m delvewheel repair --add-path "$env:HDF5_ROOT\bin" --wheel-dir wheelhouse $_.FullName
          }

      - name: Install built wheel
        shell: bash
        run: |
          python -m pip install "$(pwd)"/wheelhouse/*.whl

      - name: Import smoke test
        shell: bash
        run: |
          cd "${RUNNER_TEMP}"
          python -c "import CGNS; import CGNS.MAP; import CGNS.PAT; import CGNS.VAL; import CGNS.APP; print('pyCGNS import smoke test OK')"

      - name: Upload repaired wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: repaired-wheel-${{ matrix.os }}-py${{ matrix.python-version }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - name: Install Linux HDF5 dependency
        run: |
          sudo apt-get update
          sudo apt-get install -y libhdf5-dev pkg-config
      - name: Install build frontend
        run: python -m pip install --upgrade pip build
      - name: Build sdist
        run: python -m build --sdist --outdir dist